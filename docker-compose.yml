version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: masseverbrauch-api
    ports:
      - "50570:8080"
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: masseverbrauch-web
    ports:
      - "50571:80"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8080/api/calculate
    restart: unless-stopped
