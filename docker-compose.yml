version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: masseverbrauch-api
    ports:
      - "8080:8080"
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: masseverbrauch-web
    ports:
      - "8081:80"
    depends_on:
      - api
    restart: unless-stopped
